<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yi-LM Online - 彝语中文神经机器翻译系统，支持实时翻译与智能对话">
    <meta name="theme-color" content="#3d5a47">
    <title>Yi-LM Online - 彝语中文翻译</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 背景装饰层 -->
    <div class="bg-layer" aria-hidden="true">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <!-- 导航栏 -->
    <header class="nav" role="banner">
        <div class="brand">
            <div class="logo" aria-label="Yi-LM Logo">Yi</div>
            <div class="brand-text">
                <div class="title">Yi-LM Online</div>
                <div class="subtitle">彝语 ⇀ 中文 · Neural Translator</div>
            </div>
        </div>
        
        <nav class="left-tabs" role="navigation" aria-label="主导航">
            <button class="tab-btn" data-tab="chatbot" onclick="switchTab('chatbot')" aria-selected="false">
                Chatbot
            </button>
            <button class="tab-btn active" data-tab="translator" onclick="switchTab('translator')" aria-selected="true">
                翻译
            </button>
        </nav>
        
        <div class="right-actions">
            <button class="theme-toggle icon-toggle" id="themeToggle" type="button" aria-label="切换主题">
                <span class="theme-icon theme-icon-moon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M20 15.2A8.5 8.5 0 1 1 8.8 4a7 7 0 1 0 11.2 11.2Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                <span class="theme-icon theme-icon-sun" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M12 2.8V5.1M12 18.9v2.3M21.2 12h-2.3M5.1 12H2.8M18.5 5.5l-1.6 1.6M7.1 16.9l-1.6 1.6M18.5 18.5l-1.6-1.6M7.1 7.1 5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </span>
            </button>
            
            <div class="user-area glass-mini" id="userArea" data-user='{{ current_user | tojson }}'>
                {% if current_user %}
                <div class="user-summary">
                    <span class="user-label">当前用户</span>
                    <span class="user-name">{{ current_user.display_name }}</span>
                </div>
                <form action="{{ url_for('logout') }}" method="post" class="logout-form">
                    <button class="pill user-action" type="submit">退出</button>
                </form>
                {% else %}
                <a class="pill user-action" href="{{ url_for('login') }}">登录</a>
                {% endif %}
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="page" role="main">
        <section class="badge" aria-label="功能标识">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            彝语 → 中文 · Neural Glass UI
        </section>

        <!-- 翻译标签页 -->
        <div id="tab-translator" class="tab-content active" role="tabpanel" aria-labelledby="translator-tab">
            <div class="layout">
                <section class="chat-panel glass" aria-label="翻译工作区">
                    <div class="panel-header">
                        <div>
                            <h1>实时翻译</h1>
                            <p>输入彝语句子，获取中文翻译与词典条目</p>
                        </div>
                        <button class="pill" id="sidebarToggle" aria-label="切换词典侧边栏" aria-expanded="true">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            词典
                        </button>
                    </div>

                    <div class="input-card glass">
                        <label for="inputText" class="visually-hidden">彝语输入框</label>
                        <textarea 
                            id="inputText" 
                            placeholder="请输入彝语文本，Ctrl/Cmd + Enter 快速翻译"
                            aria-describedby="input-hint"
                            spellcheck="false"
                        ></textarea>
                        <div class="actions">
                            <div class="hint" id="input-hint">支持多轮翻译历史 · 自动匹配词典</div>
                            <button id="translateBtn" type="button">翻译</button>
                        </div>
                    </div>

                    <div id="conversationList" class="conversation-list" role="log" aria-live="polite" aria-label="翻译历史"></div>
                </section>

                <aside id="sidebar" class="sidebar glass" aria-label="词典条目">
                    <div class="sidebar-header">
                        <h2>词典条目</h2>
                        <p id="sidebarSubtitle">最新翻译</p>
                    </div>
                    <div id="dictionaryEntries" class="dictionary-entries" role="list"></div>
                </aside>
            </div>
        </div>

        <!-- Chatbot 标签页 -->
        <div id="tab-chatbot" class="tab-content" role="tabpanel" aria-labelledby="chatbot-tab">
            <div class="chatbot-shell">
                <aside class="chatbot-history glass" id="chatHistory" aria-label="历史会话">
                    <div class="history-header">
                        <h3>历史会话</h3>
                        <div class="history-actions">
                            <button class="clear-btn" id="newChatBtn" type="button">New Chat</button>
                            <button class="clear-btn" id="clearHistoryBtn" type="button">清空</button>
                        </div>
                    </div>
                    <div id="sessionList" class="session-list" role="listbox" aria-label="会话列表"></div>
                </aside>

                <section class="chatbot-window glass" aria-label="聊天窗口">
                    <div class="chatbot-header">
                        <div>
                            <h1>彝语 Chatbot</h1>
                            <p>自动翻译后再与模型对话</p>
                        </div>
                    </div>
                    <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-label="聊天消息"></div>
                    <div class="chat-input-bar">
                        <label for="chatInput" class="visually-hidden">聊天输入框</label>
                        <textarea 
                            id="chatInput" 
                            placeholder="输入彝语，按 Enter 发送，Shift+Enter 换行"
                            aria-describedby="chat-hint"
                        ></textarea>
                        <button id="chatSendBtn" type="button">发送</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- Toast 提示 -->
    <div id="toast" class="toast hidden" role="alert" aria-live="assertive"></div>

    <!-- 视觉隐藏辅助类 -->
    <style>
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
