<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="登录 Yi-LM Online - 彝语中文翻译系统">
    <meta name="theme-color" content="#3d5a47">
    <title>登录 / 注册 - Yi-LM Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <!-- 背景装饰层 -->
    <div class="bg-layer" aria-hidden="true">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <main class="auth-shell" role="main">
        <section class="auth-card glass">
            <a class="auth-back" href="{{ url_for('index') }}" aria-label="返回首页">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                返回首页
            </a>
            
            <div class="auth-copy">
                <div class="badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    用户登录 / 注册
                </div>
                <h1>提交正确翻译前请先登录</h1>
                <p>首次填写邮箱会自动创建用户。用户名可选，邮箱必填。</p>
            </div>

            {% if error %}
            <div class="auth-error" role="alert">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 8px;">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="auth-form" novalidate>
                <label class="auth-field">
                    <span>用户名</span>
                    <input
                        type="text"
                        name="username"
                        placeholder="请输入用户名（可选）"
                        value="{{ form_data.username if form_data else '' }}"
                        autocomplete="username"
                    >
                </label>
                
                <label class="auth-field">
                    <span>邮箱 <em>*</em></span>
                    <input
                        type="email"
                        name="email"
                        placeholder="name@example.com"
                        required
                        value="{{ form_data.email if form_data else '' }}"
                        autocomplete="email"
                    >
                </label>
                
                <button type="submit" class="auth-submit">
                    登录并继续
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-left: 8px;">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>

            {% if current_user %}
            <div class="auth-note">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                当前已登录：{{ current_user.display_name }}
            </div>
            {% endif %}
        </section>
    </main>

    <!-- 视觉隐藏辅助类 -->
    <style>
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</body>
</html>
